<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Grandía Studio - Editor Profesional Full</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #3b82f6; --inv-bg: #ffffff; --inv-accent: #d4a373; 
            --inv-text: #555; --inv-btn-radius: 30px; --inv-font-t: 'Great Vibes';
        }
        body { font-family: 'Montserrat', sans-serif; margin: 0; display: flex; background: #f3f4f6; height: 100vh; overflow: hidden; }

        /* PANEL IZQUIERDO (TU ESTILO) */
        #panel { width: 480px; background: white; padding: 25px; overflow-y: auto; box-shadow: 10px 0 30px rgba(0,0,0,0.1); z-index: 100; }
        .group-box { background: #fff; border: 1px solid #e5e7eb; padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        .group-box h2 { font-size: 13px; text-transform: uppercase; color: #4b5563; margin: 0 0 15px 0; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        
        label { display: block; font-size: 11px; font-weight: 700; color: #6b7280; margin: 12px 0 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; background: #f9fafb; font-size: 13px; }
        
        .btn-trash { position: absolute; top: 15px; right: 15px; background: #fee2e2; color: #ef4444; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* VISTA PREVIA (IPHONE) */
        #viewport { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #phone { 
            width: 375px; height: 780px; border: 12px solid #1f2937; border-radius: 50px; 
            background: var(--inv-bg); overflow-y: auto; position: relative; scroll-behavior: smooth;
        }

        /* SECCIONES INVITACIÓN */
        section { padding: 50px 25px; text-align: center; color: var(--inv-text); }
        .v-hero { height: 400px; background: url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=500&q=80') center/cover; display: flex; flex-direction: column; justify-content: center; color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.6); }
        .v-title { font-family: var(--inv-font-t), cursive; color: var(--inv-accent); font-size: 3rem; margin: 0; }
        .v-btn { display: block; width: 85%; margin: 15px auto; padding: 15px; background: var(--inv-accent); color: white; border-radius: var(--inv-btn-radius); text-decoration: none; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        
        /* Contador */
        .timer { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .t-unit { background: #fdfaf7; padding: 10px; border-radius: 8px; min-width: 50px; border: 1px solid #eee; }
        .t-unit b { display: block; font-size: 18px; color: var(--inv-accent); }
        
        /* Iconos Itinerario */
        .step { display: flex; align-items: center; gap: 15px; text-align: left; margin-bottom: 20px; border-left: 2px solid var(--inv-accent); padding-left: 15px; }
    </style>
</head>
<body>

<aside id="panel">
    <h1>Mi Grandía Studio ✨</h1>
    <p style="font-size:12px; color:#666; margin-bottom:20px;">Versión Profesional 7.0</p>

    <div class="group-box">
        <h2>🎨 Diseño y Colores</h2>
        <label>Fondo de Invitación</label>
        <input type="color" id="g-bg" value="#ffffff" oninput="sync()">
        <label>Textura de Fondo (URL)</label>
        <input type="text" id="g-bg-img" oninput="sync()" placeholder="URL de mármol o papel">
        <label>Color de Acento</label>
        <input type="color" id="g-accent" value="#d4a373" oninput="sync()">
        <label>Forma de Botones</label>
        <select id="g-radius" onchange="sync()">
            <option value="30px">Redondos</option>
            <option value="5px">Cuadrados</option>
        </select>
    </div>

    <div class="group-box">
        <h2>⏰ Cuenta Regresiva</h2>
        <label>Fecha y Hora del Evento</label>
        <input type="datetime-local" id="g-date" value="2026-12-31T20:00" oninput="updateTimer()">
    </div>

    <div class="group-box">
        <h2>📸 Galería y Fotos</h2>
        <label>Foto de Portada (URL)</label>
        <input type="text" id="g-hero" value="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=500&q=80" oninput="sync()">
    </div>

    <div class="group-box">
        <h2>➕ Agregar Secciones</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <button onclick="add('padrinos')">+ Padrinos</button>
            <button onclick="add('itinerario')">+ Itinerario</button>
            <button onclick="add('regalos')">+ Regalos</button>
            <button onclick="add('hotel')">+ Hotel</button>
        </div>
        <div id="dynamic-editors" style="margin-top:20px;"></div>
    </div>

    <button class="btn-main" onclick="window.print()">FINALIZAR Y PUBLICAR 📥</button>
</aside>

<main id="viewport">
    <div id="phone">
        <section id="v-hero" class="v-hero">
            <div data-aos="fade-down">
                <h1 id="v-names" class="v-title" style="color:white !important;">Sofía & Ale</h1>
                <p>NUESTRA BODA</p>
            </div>
        </section>

        <section data-aos="fade-up">
            <p style="font-size:11px; letter-spacing:2px;">FALTAN SÓLO</p>
            <div class="timer">
                <div class="t-unit"><b id="d">00</b><span>Días</span></div>
                <div class="t-unit"><b id="h">00</b><span>Hs</span></div>
                <div class="t-unit"><b id="m">00</b><span>Min</span></div>
            </div>
        </section>

        <div id="v-content"></div>

        <div id="v-music"></div>
    </div>
</main>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();
    let count = 0;

    function sync() {
        const root = document.documentElement.style;
        const phone = document.getElementById('phone').style;
        
        root.setProperty('--inv-bg', document.getElementById('g-bg').value);
        root.setProperty('--inv-accent', document.getElementById('g-accent').value);
        root.setProperty('--inv-btn-radius', document.getElementById('g-radius').value);
        
        const bgImg = document.getElementById('g-bg-img').value;
        phone.backgroundImage = bgImg ? `url('${bgImg}')` : 'none';
        document.getElementById('v-hero').style.backgroundImage = `url('${document.getElementById('g-hero').value}')`;
    }

    function updateTimer() {
        const target = new Date(document.getElementById('g-date').value).getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            if(diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / 86400000);
                document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
                document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
            }
        }, 1000);
    }

    function add(type) {
        count++;
        const id = `b${count}`;
        const edit = document.createElement('div');
        edit.className = 'group-box';
        edit.id = `ed-${id}`;
        edit.innerHTML = `<button class="btn-trash" onclick="remove('${id}')">×</button><h3>${type.toUpperCase()}</h3>`;
        
        const view = document.createElement('section');
        view.id = `vw-${id}`;
        view.setAttribute('data-aos', 'fade-up');

        if(type === 'padrinos') {
            edit.innerHTML += `<label>Nombres</label><textarea oninput="updTxt('${id}', this.value)"></textarea>`;
            view.innerHTML = `<h3>Padrinos</h3><p id="val-${id}">Nombres aquí...</p>`;
        } else if(type === 'itinerario') {
            edit.innerHTML += `<label>Evento</label><input type="text" oninput="updTxt('${id}', this.value)">`;
            view.innerHTML = `<div class="step"><div><b id="val-${id}">Evento</b><br><small>Hora: 00:00</small></div></div>`;
        } else if(type === 'regalos') {
            edit.innerHTML += `<label>CLABE Bancaria</label><input type="text" oninput="updTxt('${id}', this.value)">`;
            view.innerHTML = `<h3>Lluvia de Sobres</h3><div style="border:1px dashed var(--inv-accent); padding:15px;"><p id="val-${id}">0000000000</p></div>`;
        } else if(type === 'hotel') {
            edit.innerHTML += `<label>Nombre Hotel</label><input type="text" oninput="updTxt('${id}', this.value)">`;
            view.innerHTML = `<h3>Hospedaje</h3><p id="val-${id}">Hotel...</p><a href="#" class="v-btn">Reservar ahora</a>`;
        }

        document.getElementById('dynamic-editors').appendChild(edit);
        document.getElementById('v-content').appendChild(view);
        AOS.refresh();
    }

    function updTxt(id, val) { document.getElementById(`val-${id}`).innerText = val; }
    function remove(id) { document.getElementById(`ed-${id}`).remove(); document.getElementById(`vw-${id}`).remove(); }

    updateTimer();
    sync();
</script>
</body>
</html>
