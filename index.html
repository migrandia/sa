<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editor Maestro - Mi Gran Día</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --dark: #111; --glass: rgba(255, 255, 255, 0.95); }
        
        /* 1. ENTORNO (Escenario Oxford para que el diseño brille) */
        body, html { margin: 0; padding: 0; height: 100%; background: #1a1a1a; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        
        #editor-canvas { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px;
        }

        /* 2. EL DISPOSITIVO (Adaptable) */
        #phone-wrapper { 
            width: 100%; max-width: 400px; height: 90vh; background: #fff; 
            position: relative; border-radius: 40px; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 8px solid #000;
        }

        /* FONDO FIJO (Capa 1) */
        #fixed-bg { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            z-index: 1; pointer-events: none; background-size: cover; opacity: 0.6;
        }

        /* CONTENIDO SCROLL (Capa 2) */
        #main-scroll { 
            position: relative; z-index: 2; height: 100%; overflow-y: auto; scroll-behavior: smooth;
        }

        /* 3. MENÚ DE EDICIÓN FLOTANTE (Se activa al tocar) */
        #floating-menu { 
            position: fixed; bottom: -100%; left: 0; width: 100%; 
            background: var(--glass); border-top: 4px solid var(--gold);
            z-index: 2000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 20px; box-sizing: border-box; border-radius: 25px 25px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2); color: #333;
        }
        #floating-menu.active { bottom: 0; }

        /* ESTILOS DE ELEMENTOS */
        .editable { cursor: pointer; transition: 0.3s; position: relative; }
        .editable:hover { outline: 2px dashed var(--gold); background: rgba(184,134,11,0.1); }
        
        .sec { padding: 80px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .v-img { width: 100%; border-radius: 10px; margin: 15px 0; }
        .v-btn { padding: 18px 35px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; }

        /* CONTROLES DENTRO DEL MENÚ */
        .grid-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tool-box { margin-bottom: 15px; }
        label { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #777; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        .close-btn { position: absolute; right: 20px; top: 10px; font-size: 24px; cursor: pointer; color: #999; }

        /* BOTÓN FLOTANTE PARA CONFIG GLOBAL */
        #global-config-btn {
            position: fixed; top: 20px; right: 20px; background: var(--gold);
            color: white; padding: 15px; border-radius: 50%; cursor: pointer; z-index: 3000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold;
        }
    </style>
</head>
<body>

<div id="global-config-btn" onclick="openGlobal()">⚙️</div>

<div id="editor-canvas">
    <div id="phone-wrapper">
        <div id="fixed-bg"></div>
        <div id="main-scroll">
            
            <section class="sec" style="min-height: 80vh; justify-content: center;">
                <div class="editable" id="txt-nombres" onclick="openMenu('txt-nombres', 'text')" style="font-family:'Great Vibes'; font-size:4rem;">Cecilia & Ruben</div>
                <div class="editable" id="txt-slogan" onclick="openMenu('txt-slogan', 'text')" style="letter-spacing:5px; font-weight:bold; font-size:12px;">¡NUESTRA BODA!</div>
                <img id="img-portada" src="https://images.unsplash.com/photo-1519741497674-611481863552?w=600" class="v-img editable" onclick="openMenu('img-portada', 'img')">
            </section>

            <section class="sec">
                <div class="editable" id="txt-cuenta" onclick="openMenu('txt-cuenta', 'text')">FALTAN:</div>
                <div id="countdown" style="font-size: 2rem; font-weight: bold; color: var(--gold); margin: 20px 0;">00:00:00:00</div>
                <input type="datetime-local" id="wedding-date" onchange="save()" style="width: auto;">
            </section>

            <section class="sec">
                <a href="https://wa.me/9911105456" class="v-btn editable" id="btn-rsvp" onclick="openMenu('btn-rsvp', 'btn')" style="background:#25D366; color:#fff; border-radius:50px;">CONFIRMAR ASISTENCIA</a>
            </section>

        </div>
    </div>
</div>

<div id="floating-menu">
    <span class="close-btn" onclick="closeMenu()">×</span>
    <div id="menu-content">
        </div>
    <button onclick="closeMenu()" style="width:100%; padding:15px; background:var(--dark); color:#fff; border:none; border-radius:10px; margin-top:15px; font-weight:bold;">LISTO</button>
</div>

<script>
    let activeId = null;

    function openMenu(id, type) {
        activeId = id;
        const el = document.getElementById(id);
        const menu = document.getElementById('floating-menu');
        const content = document.getElementById('menu-content');
        
        let html = `<h3 style="margin-top:0; color:var(--gold)">Editar ${type === 'text' ? 'Texto' : type === 'img' ? 'Imagen' : 'Botón'}</h3>`;

        if(type === 'text' || type === 'btn') {
            html += `<div class="tool-box"><label>Contenido</label><textarea id="input-val" oninput="updateText(this.value)">${el.innerHTML.replace(/<br>/g, '\n')}</textarea></div>`;
            html += `<div class="grid-tools">
                <div class="tool-box"><label>Fuente</label><select onchange="updateStyle('fontFamily', this.value)">
                    <option value="'Montserrat'">Moderna</option><option value="'Great Vibes'">Cursiva</option><option value="'Cinzel'">Imperial</option>
                </select></div>
                <div class="tool-box"><label>Color</label><input type="color" oninput="updateStyle('color', this.value)"></div>
            </div>`;
            if(type === 'btn') {
                html += `<div class="tool-box"><label>Link (URL)</label><input type="text" value="${el.href}" onchange="document.getElementById(activeId).href=this.value; save()"></div>`;
            }
        }

        if(type === 'img') {
            html += `<div class="tool-box"><label>URL de la Imagen</label><input type="text" value="${el.src}" onchange="document.getElementById(activeId).src=this.value; save()"></div>`;
            html += `<div class="tool-box"><label>Borde Dorado</label><input type="checkbox" onchange="document.getElementById(activeId).style.border=this.checked?'5px solid #b8860b':'none'; save()"></div>`;
        }

        content.innerHTML = html;
        menu.classList.add('active');
    }

    function openGlobal() {
        const menu = document.getElementById('floating-menu');
        const content = document.getElementById('menu-content');
        content.innerHTML = `
            <h3 style="color:var(--gold)">Configuración Global</h3>
            <label>Color de Fondo Fijo</label><input type="color" oninput="document.getElementById('phone-wrapper').style.backgroundColor=this.value; save()">
            <label>Textura de Fondo</label><select onchange="document.getElementById('fixed-bg').style.backgroundImage='url('+this.value+')'; save()">
                <option value="">Ninguna</option>
                <option value="https://www.transparenttextures.com/patterns/white-marble.png">Mármol Blanco</option>
                <option value="https://www.transparenttextures.com/patterns/handmade-paper.png">Papel Artesanal</option>
            </select>
        `;
        menu.classList.add('active');
    }

    function closeMenu() { document.getElementById('floating-menu').classList.remove('active'); }

    function updateText(val) { document.getElementById(activeId).innerHTML = val.replace(/\n/g, '<br>'); save(); }
    function updateStyle(prop, val) { document.getElementById(activeId).style[prop] = val; save(); }

    function save() {
        localStorage.setItem('invitacion_v6', document.getElementById('main-scroll').innerHTML);
        localStorage.setItem('invitacion_bg_v6', document.getElementById('fixed-bg').style.backgroundImage);
    }

    window.onload = () => {
        const saved = localStorage.getItem('invitacion_v6');
        if(saved) document.getElementById('main-scroll').innerHTML = saved;
        const bg = localStorage.getItem('invitacion_bg_v6');
        if(bg) document.getElementById('fixed-bg').style.backgroundImage = bg;
        
        setInterval(() => {
            const diff = new Date(document.getElementById('wedding-date').value) - new Date();
            if(diff > 0) {
                const d = Math.floor(diff/864e5), h = Math.floor((diff%864e5)/36e5), m = Math.floor((diff%36e5)/6e4), s = Math.floor((diff%6e4)/1000);
                document.getElementById('countdown').innerText = `${d}d ${h}h ${m}m ${s}s`;
            }
        }, 1000);
    }
</script>
</body>
</html>
