<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Grandía Studio - Live Editor Pro</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Parisienne&family=Alex+Brush&family=Cormorant+Garamond:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #d4a373; --bg-inv: #ffffff; --text-inv: #444; 
            --f-names: 'Great Vibes'; --f-body: 'Montserrat';
        }
        body { font-family: 'Montserrat', sans-serif; margin: 0; display: flex; background: #e2e8f0; height: 100vh; overflow: hidden; }

        /* --- PANEL DE CONTROL ESTILO APP --- */
        #editor-panel { width: 400px; background: white; display: flex; flex-direction: column; box-shadow: 5px 0 25px rgba(0,0,0,0.1); z-index: 100; }
        
        /* Barra de Pestañas Lateral */
        .sidebar-tabs { display: flex; background: #1a1a1a; padding: 10px; justify-content: space-around; }
        .tab-btn { background: none; border: none; color: #666; cursor: pointer; padding: 10px; font-size: 18px; transition: 0.3s; }
        .tab-btn.active { color: var(--accent); transform: scale(1.2); }

        .content-area { padding: 25px; overflow-y: auto; flex-grow: 1; display: none; }
        .content-area.active { display: block; }

        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #333; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        label { display: block; font-size: 10px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 13px; }

        /* --- VISTA PREVIA (EL CELULAR) --- */
        #preview-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #phone-container { 
            width: 360px; height: 740px; border: 12px solid #111; border-radius: 40px; 
            background: var(--bg-inv); overflow-y: auto; position: relative; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.2); scroll-behavior: smooth;
        }

        /* Efecto Click-to-Edit */
        .editable { cursor: pointer; transition: 0.3s; position: relative; border: 2px solid transparent; }
        .editable:hover { border: 2px dashed var(--accent); background: rgba(212, 163, 115, 0.05); }
        .editable::after { content: '✎ Editar'; position: absolute; top: -10px; right: 10px; background: var(--accent); color: white; font-size: 9px; padding: 2px 6px; border-radius: 4px; opacity: 0; transition: 0.3s; }
        .editable:hover::after { opacity: 1; }

        /* Estilos de la Invitación */
        .hero { height: 400px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .v-names { font-family: var(--f-names); font-size: 3.5rem; text-shadow: 2px 2px 8px rgba(0,0,0,0.4); }
        .v-sec { padding: 40px 20px; text-align: center; color: var(--text-inv); }
        
        .timer { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .t-box { background: rgba(0,0,0,0.03); padding: 10px; border-radius: 8px; min-width: 50px; }
        .t-box b { display: block; font-size: 20px; color: var(--accent); }

        .btn-inv { display: block; width: 80%; margin: 10px auto; padding: 15px; background: var(--accent); color: white; border-radius: 25px; text-decoration: none; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        
        /* Bloque de Borrar */
        .trash-btn { position: absolute; top: 5px; right: 5px; background: #ff4d4d; color: white; border: none; border-radius: 50%; cursor: pointer; display: none; }
        .v-sec:hover .trash-btn { display: block; }
    </style>
</head>
<body>

<aside id="editor-panel">
    <div class="sidebar-tabs">
        <button class="tab-btn active" onclick="openTab('tab-diseno', this)" title="Diseño">🎨</button>
        <button class="tab-btn" onclick="openTab('tab-texto', this)" title="Textos">✍️</button>
        <button class="tab-btn" onclick="openTab('tab-musica', this)" title="Música">🎵</button>
        <button class="tab-btn" onclick="openTab('tab-bloques', this)" title="Agregar">➕</button>
    </div>

    <div id="tab-diseno" class="content-area active">
        <h2>Apariencia Global</h2>
        <label>Color de Acento</label>
        <input type="color" id="cp-accent" value="#d4a373" oninput="updateStyles()">
        <label>Fondo de Invitación</label>
        <input type="color" id="cp-bg" value="#ffffff" oninput="updateStyles()">
        <label>Fuente de Nombres</label>
        <select id="fs-names" onchange="updateStyles()">
            <option value="'Great Vibes'">Great Vibes</option>
            <option value="'Parisienne'">Parisienne</option>
            <option value="'Alex Brush'">Alex Brush</option>
        </select>
    </div>

    <div id="tab-texto" class="content-area">
        <h2>Contenido Principal</h2>
        <label>Nombres de Festejados</label>
        <input type="text" id="in-names" value="Sofía & Ale" oninput="syncText()">
        <label>Fecha del Evento</label>
        <input type="datetime-local" id="in-date" value="2026-12-31T20:00" oninput="startTimer()">
    </div>

    <div id="tab-bloques" class="content-area">
        <h2>Añadir Bloques</h2>
        <button class="btn-inv" style="background:#333;" onclick="addDynamic('itinerario')">+ Itinerario</button>
        <button class="btn-inv" style="background:#333;" onclick="addDynamic('foto')">+ Galería de Fotos</button>
        <button class="btn-inv" style="background:#333;" onclick="addDynamic('ubicacion')">+ Mapa de Lugar</button>
        <div id="block-settings" style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;"></div>
    </div>
</aside>

<main id="preview-zone">
    <div id="phone-container">
        <section class="hero editable" id="v-hero" style="background-image: url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=500&q=80');" onclick="openTab('tab-diseno')">
            <div data-aos="fade-up">
                <h1 class="v-names" id="vw-names">Sofía & Ale</h1>
            </div>
        </section>

        <section class="v-sec editable" onclick="openTab('tab-texto')">
            <p style="font-size:10px; letter-spacing:2px;">NUESTRA HISTORIA COMIENZA EN</p>
            <div class="timer">
                <div class="t-box"><b id="d">00</b><span>Días</span></div>
                <div class="t-box"><b id="h">00</b><span>Hs</span></div>
                <div class="t-box"><b id="m">00</b><span>Min</span></div>
            </div>
        </section>

        <div id="dynamic-area"></div>

        <section class="v-sec">
            <a href="#" class="btn-inv">📍 Cómo llegar</a>
            <a href="#" class="btn-inv" style="background:#25d366;">Confirmar Asistencia</a>
        </section>
    </div>
</main>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();
    let blockId = 0;

    function openTab(tabId, btn) {
        document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if(btn) btn.classList.add('active');
    }

    function updateStyles() {
        const root = document.documentElement.style;
        root.setProperty('--accent', document.getElementById('cp-accent').value);
        root.setProperty('--bg-inv', document.getElementById('cp-bg').value);
        root.setProperty('--f-names', document.getElementById('fs-names').value);
    }

    function syncText() {
        document.getElementById('vw-names').innerText = document.getElementById('in-names').value;
    }

    function addDynamic(type) {
        blockId++;
        const id = `block-${blockId}`;
        const area = document.getElementById('dynamic-area');
        const sec = document.createElement('section');
        sec.className = 'v-sec editable';
        sec.id = id;
        sec.setAttribute('data-aos', 'fade-up');
        
        // Botón de borrar
        sec.innerHTML = `<button class="trash-btn" onclick="document.getElementById('${id}').remove()">✕</button>`;

        if(type === 'itinerario') {
            sec.innerHTML += `<h3>📅 Itinerario</h3><p>6:00 PM - Ceremonia<br>8:00 PM - Cena</p>`;
        } else if(type === 'foto') {
            sec.innerHTML += `<img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=400" style="width:100%; border-radius:15px;">`;
        }
        
        area.appendChild(sec);
        AOS.refresh();
    }

    function startTimer() {
        const target = new Date(document.getElementById('in-date').value).getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if(diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / 86400000);
                document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
                document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
            }
        }, 1000);
    }

    startTimer();
</script>
</body>
</html>
