<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Real - Cecilia & Ruben</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --pink: #fdf2f5; --glass: rgba(255, 255, 255, 0.98); }
        body, html { margin: 0; padding: 0; height: 100%; background: #111; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* CONTENEDOR PRINCIPAL */
        #editor-canvas { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; background: #222; }

        /* EL CELULAR */
        #phone-frame { 
            width: 380px; height: 85vh; background: #fff; position: relative; 
            border-radius: 40px; border: 10px solid #000; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* CAPA DE FONDO FIJA */
        #bg-layer { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; pointer-events: none; }

        /* AREA DE SCROLL */
        #scroll-content { position: relative; z-index: 2; height: 100%; overflow-y: auto; scroll-behavior: smooth; }

        /* ELEMENTOS EDITABLES */
        .editable { 
            position: absolute; cursor: move; user-select: none; touch-action: none; 
            text-align: center; min-width: 50px; z-index: 10;
        }
        .editable:hover { outline: 2px dashed var(--gold); }
        
        /* ESTILOS DE TEXTO */
        .title-lg { font-family: 'Great Vibes'; font-size: 55px; color: var(--gold); width: 100%; }
        .subtitle { letter-spacing: 5px; font-size: 12px; font-weight: bold; width: 100%; }
        .body-text { font-size: 14px; line-height: 1.6; padding: 0 40px; box-sizing: border-box; }

        /* BOTONES */
        .v-btn { 
            display: inline-block; padding: 15px 30px; font-weight: bold; 
            text-decoration: none; border-radius: 50px; border: 2px solid var(--gold); 
            font-size: 12px; transition: 0.3s;
        }
        .filled { background: var(--gold); color: white; }
        .outline { background: transparent; color: var(--gold); }

        /* PANEL EDITOR */
        #bottom-panel { 
            position: fixed; bottom: -100%; left: 0; width: 100%; 
            background: var(--glass); z-index: 3000; border-radius: 30px 30px 0 0;
            padding: 25px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            transition: 0.4s cubic-bezier(0.1, 0.9, 0.1, 1);
        }
        #bottom-panel.open { bottom: 0; }

        /* ICONO MUSICA */
        #music-toggle { position: absolute; top: 20px; right: 25px; z-index: 2000; opacity: 0.3; cursor: pointer; font-size: 24px; }
        
        .section-spacer { height: 1200px; width: 100%; pointer-events: none; } /* Espacio para que el scroll funcione */
    </style>
</head>
<body>

<div id="music-toggle" onclick="toggleAudio()">🔇</div>
<audio id="bg-music" loop></audio>

<div id="editor-canvas">
    <div id="phone-frame">
        <div id="bg-layer"></div>
        <div id="scroll-content">
            
            <div class="editable title-lg" id="txt-nombres" style="top: 100px; left: 0;">Cecilia & Ruben</div>
            <div class="editable subtitle" id="txt-boda" style="top: 170px; left: 0;">¡NUESTRA BODA!</div>
            <div class="editable" id="img-portada" style="top: 220px; left: 50%; transform: translateX(-50%); width: 80%;">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=400" style="width:100%; border-radius: 15px;">
            </div>

            <div class="editable" id="counter-sec" style="top: 550px; left: 0; width: 100%;">
                <div style="font-size: 10px; margin-bottom: 10px;">FALTAN:</div>
                <div id="clock" style="font-family: 'Cinzel'; font-size: 30px; font-weight: bold; color: var(--gold);">00:00:00:00</div>
            </div>

            <div class="editable body-text" id="txt-parents" style="top: 680px; left: 0; width: 100%;">
                <b style="color:var(--gold); font-family:'Cinzel';">NUESTROS PADRES</b><br><br>
                Emperatriz Landa & Rubén Pérez<br>
                ---<br>
                Familia del Novio
            </div>

            <div class="editable body-text" id="txt-story" style="top: 850px; left: 0; width: 100%;">
                <span style="font-family:'Cinzel'; color:var(--gold);">NUESTRA HISTORIA</span><br>
                "Un día nos encontramos y supimos que era para siempre."
            </div>

            <div class="editable" id="dress-code" style="top: 1000px; left: 50%; transform: translateX(-50%);">
                <div style="font-family:'Cinzel'; border: 1px solid var(--gold); padding: 20px; border-radius: 10px;">
                    <b>DRESS CODE</b><br>
                    <small>FORMAL / GUAYABERA</small>
                </div>
            </div>

            <div class="editable" id="btn-rsvp-area" style="top: 1150px; left: 50%; transform: translateX(-50%);">
                <a href="https://wa.me/9911105456" class="v-btn filled">CONFIRMAR ASISTENCIA</a>
            </div>

            <div class="editable" id="fl-1" style="top: 20px; left: -20px; font-size: 100px; opacity: 0.8;">🌸</div>
            <div class="editable" id="fl-2" style="top: 450px; right: -20px; font-size: 80px; opacity: 0.6;">🌿</div>

            <div class="section-spacer"></div>
        </div>
    </div>
</div>

<div id="bottom-panel">
    <div onclick="closeEdit()" style="width:40px; height:5px; background:#ccc; margin:-10px auto 20px; border-radius:10px;"></div>
    <div id="edit-ui"></div>
    <button onclick="closeEdit()" style="width:100%; padding:15px; background:black; color:white; border:none; border-radius:15px; margin-top:20px; font-weight:bold;">GUARDAR Y CERRAR</button>
</div>

<script>
    let activeId = null;
    let isMoving = false;

    // SISTEMA DE MOVIMIENTO
    function makeDraggable() {
        const items = document.querySelectorAll('.editable');
        items.forEach(el => {
            el.onmousedown = el.ontouchstart = function(e) {
                isMoving = false;
                let startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                let startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                let initialTop = el.offsetTop;
                let initialLeft = el.offsetLeft;

                document.onmousemove = document.ontouchmove = function(ev) {
                    isMoving = true;
                    let curX = (ev.type === 'touchmove' ? ev.touches[0].clientX : ev.clientX) - startX;
                    let curY = (ev.type === 'touchmove' ? ev.touches[0].clientY : ev.clientY) - startY;
                    el.style.top = (initialTop + curY) + 'px';
                    el.style.left = (initialLeft + curX) + 'px';
                    el.style.transform = 'none';
                };

                document.onmouseup = document.ontouchend = function() {
                    document.onmousemove = document.ontouchmove = null;
                };
            };

            el.onclick = function(e) {
                if(!isMoving) {
                    e.stopPropagation();
                    openEdit(el.id);
                }
            };
        });
    }

    // ABRIR EDITOR
    function openEdit(id) {
        activeId = id;
        const el = document.getElementById(id);
        const ui = document.getElementById('edit-ui');
        let html = `<h3>Editando Elemento</h3>`;

        // Si es el contador de tiempo
        if(id === 'counter-sec') {
            html += `<label>Fecha Boda</label><input type="datetime-local" onchange="setTargetDate(this.value)">`;
        } 
        // Si tiene un botón adentro
        else if(el.querySelector('a')) {
            const btn = el.querySelector('a');
            html += `<label>Texto Botón</label><input type="text" value="${btn.innerText}" oninput="document.getElementById(activeId).querySelector('a').innerText=this.value">`;
            html += `<label>Estilo</label><select onchange="changeBtnStyle(this.value)">
                <option value="filled">Relleno Dorado</option>
                <option value="outline">Solo Contorno</option>
            </select>`;
        } 
        // Texto normal o adornos
        else {
            html += `<label>Contenido</label><textarea style="height:80px" oninput="document.getElementById(activeId).innerHTML=this.value.replace(/\\n/g,'<br>')">${el.innerHTML.replace(/<br>/g,'\n')}</textarea>`;
        }

        // Diseño general
        html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
            <div><label>Tamaño</label><input type="number" placeholder="px" oninput="document.getElementById(activeId).style.fontSize=this.value+'px'"></div>
            <div><label>Capa</label><select onchange="document.getElementById(activeId).style.zIndex=this.value">
                <option value="10">Normal</option>
                <option value="100">Al Frente</option>
                <option value="1">Al Fondo</option>
            </select></div>
        </div>`;

        ui.innerHTML = html;
        document.getElementById('bottom-panel').classList.add('open');
    }

    function changeBtnStyle(val) {
        const btn = document.getElementById(activeId).querySelector('a');
        btn.classList.remove('filled', 'outline');
        btn.classList.add(val);
    }

    function closeEdit() { document.getElementById('bottom-panel').classList.remove('open'); }

    // MÚSICA
    function toggleAudio() {
        const m = document.getElementById('bg-music');
        if(m.paused) { m.play(); document.getElementById('music-toggle').innerText = '🔊'; }
        else { m.pause(); document.getElementById('music-toggle').innerText = '🔇'; }
    }

    // ELIMINAR ELEMENTO (Opcional: puedes añadir un botón de basura)
    
    makeDraggable();
</script>
</body>
</html>
