<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editor Pro - Mi Gran Dia</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --pink: #fdf2f5; --glass: rgba(255, 255, 255, 0.95); }
        
        body, html { margin: 0; padding: 0; height: 100%; background: #111; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* LIENZO DE TRABAJO */
        #canvas { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; background: radial-gradient(#333 1px, #111 1px); background-size: 20px 20px;
        }

        /* SIMULADOR DE CELULAR */
        #phone { 
            width: 380px; height: 85vh; background: #fff; position: relative; 
            border-radius: 40px; border: 12px solid #222; box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* CAPA DE FONDO (TEXTURAS) */
        #main-bg { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            z-index: 1; pointer-events: none; opacity: 0.6;
        }

        #scroll-area { position: relative; z-index: 2; flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 100px; }

        /* ELEMENTOS EDITABLES (MOVIMIENTO LIBRE) */
        .editable { 
            position: absolute; cursor: move; user-select: none; touch-action: none; 
            transition: outline 0.2s; z-index: 10; min-width: 20px; text-align: center;
        }
        .editable:hover { outline: 2px dashed var(--gold); outline-offset: 4px; }
        .layer-top { z-index: 100 !important; }
        .layer-bottom { z-index: 5 !important; }

        /* BOTONES (2 ESTILOS REQUERIDOS) */
        .v-btn { 
            display: inline-block; padding: 15px 25px; font-weight: bold; 
            text-decoration: none; border-radius: 50px; transition: 0.3s; 
            border: 2px solid var(--gold); font-size: 13px; width: 220px;
        }
        .style-filled { background: var(--gold); color: white; }
        .style-outline { background: transparent; color: var(--gold); }

        /* CONTADOR */
        #timer-box { font-family: 'Cinzel'; font-size: 24px; color: var(--gold); font-weight: bold; }

        /* PANEL DE EDICIÓN (BOTTOM SHEET) */
        #editor-panel { 
            position: fixed; bottom: -100%; left: 0; width: 100%; 
            background: var(--glass); z-index: 2000; border-radius: 30px 30px 0 0;
            padding: 25px; box-sizing: border-box; box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
            transition: 0.4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        #editor-panel.active { bottom: 0; }
        .handle { width: 40px; height: 5px; background: #ddd; border-radius: 10px; margin: -10px auto 20px; }

        /* CONTROLES */
        .row { margin-bottom: 15px; }
        label { font-size: 10px; font-weight: bold; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* BOTONES FLOTANTES */
        .f-btn { position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; background: var(--gold); color: #fff; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; z-index: 1500; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #config-global { position: fixed; bottom: 25px; right: 25px; background: #000; color: #fff; padding: 15px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 1500; border: 2px solid var(--gold); }

        /* BOCINA INVISIBLE */
        #music-btn { position: absolute; top: 20px; right: 20px; z-index: 1000; opacity: 0.2; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

<div id="music-btn" onclick="toggleMusic()">🔇</div>
<audio id="bg-audio" loop></audio>

<button class="f-btn" onclick="addNewElement('🌸')">+</button>
<div id="config-global" onclick="openGlobalSettings()">FONDO Y MÚSICA</div>

<div id="canvas">
    <div id="phone">
        <div id="main-bg"></div>
        <div id="scroll-area">
            
            <div class="editable" id="nombres" style="top: 80px; left: 50%; transform: translateX(-50%); font-family: 'Great Vibes'; font-size: 50px; width: 100%;">Cecilia & Ruben</div>
            <div class="editable" id="slogan" style="top: 150px; left: 50%; transform: translateX(-50%); letter-spacing: 5px; font-size: 12px;">NUESTRA BODA</div>

            <div class="editable" id="timer-group" style="top: 250px; left: 50%; transform: translateX(-50%);">
                <div style="font-size: 10px; margin-bottom: 5px;">FALTAN:</div>
                <div id="timer-box">00:00:00:00</div>
            </div>

            <div class="editable btn-container" id="btn-rsvp" style="top: 400px; left: 50%; transform: translateX(-50%);">
                <a href="#" class="v-btn style-filled">CONFIRMAR ASISTENCIA</a>
            </div>

            <div class="editable" id="flower-1" style="top: 20px; left: 20px; font-size: 80px;">🌸</div>

        </div>
    </div>
</div>

<div id="editor-panel">
    <div class="handle" onclick="closeEditor()"></div>
    <div id="editor-content"></div>
    <button onclick="closeEditor()" style="width:100%; padding:15px; background:var(--gold); color:white; border:none; border-radius:12px; margin-top:15px; font-weight:bold;">APLICAR CAMBIOS</button>
</div>

<script>
    let activeId = null;
    let musicOn = false;

    // 1. INICIAR ARRASTRE (DRAG & DROP)
    function initDrag() {
        const elements = document.querySelectorAll('.editable');
        elements.forEach(el => {
            el.onmousedown = startMoving;
            el.ontouchstart = startMoving;
            el.onclick = (e) => { e.stopPropagation(); openEditor(el.id); };
        });
    }

    function startMoving(e) {
        const el = this;
        let startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        let startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
        let initTop = el.offsetTop;
        let initLeft = el.offsetLeft;

        document.onmousemove = document.ontouchmove = (ev) => {
            let moveX = (ev.type === 'touchmove' ? ev.touches[0].clientX : ev.clientX) - startX;
            let moveY = (ev.type === 'touchmove' ? ev.touches[0].clientY : ev.clientY) - startY;
            el.style.top = (initTop + moveY) + 'px';
            el.style.left = (initLeft + moveX) + 'px';
            el.style.transform = 'none'; // Quita el centrado automático al mover
        };

        document.onmouseup = document.ontouchend = () => {
            document.onmousemove = document.ontouchmove = null;
        };
    }

    // 2. ABRIR EDITOR SEGÚN EL TIPO DE ELEMENTO
    function openEditor(id) {
        activeId = id;
        const el = document.getElementById(id);
        const panel = document.getElementById('editor-content');
        let ui = `<h3>Editar Elemento</h3>`;

        // Si es el contador
        if(id === 'timer-group') {
            ui += `<div class="row"><label>Fecha del Evento</label><input type="datetime-local" id="new-date" onchange="updateEventDate(this.value)"></div>`;
        } 
        // Si es un botón (Cambio de Estilo Requerido)
        else if(el.classList.contains('btn-container')) {
            const btn = el.querySelector('a');
            ui += `<div class="row"><label>Texto del Botón</label><input type="text" value="${btn.innerText}" oninput="updateBtnText(this.value)"></div>`;
            ui += `<div class="row"><label>Estilo de Botón</label><select onchange="updateBtnStyle(this.value)">
                    <option value="style-filled" ${btn.classList.contains('style-filled')?'selected':''}>Estilo 1: Relleno</option>
                    <option value="style-outline" ${btn.classList.contains('style-outline')?'selected':''}>Estilo 2: Contorno</option>
                  </select></div>`;
        }
        // Si es texto o adorno
        else {
            ui += `<div class="row"><label>Contenido (Texto o Emoji)</label><input type="text" value="${el.innerText}" oninput="updateText(this.value)"></div>`;
        }

        // Controles de diseño comunes (Color, Tamaño, Capas)
        ui += `<div class="grid">
            <div class="row"><label>Color</label><input type="color" oninput="updateStyle('color', this.value)"></div>
            <div class="row"><label>Tamaño (px)</label><input type="number" oninput="updateStyle('fontSize', this.value + 'px')"></div>
        </div>`;
        ui += `<div class="row"><label>Posición de Capa</label><select onchange="updateStyle('zIndex', this.value)">
                <option value="10">Normal</option><option value="100">Al Frente (Encima)</option><option value="1">Al Fondo (Atrás)</option>
              </select></div>`;
        ui += `<button onclick="deleteEl()" style="background:none; color:red; border:none; font-size:11px; cursor:pointer;">🗑️ Eliminar elemento</button>`;

        panel.innerHTML = ui;
        document.getElementById('editor-panel').classList.add('active');
    }

    // 3. CONFIGURACIÓN GLOBAL (FONDO Y TEXTURA)
    function openGlobalSettings() {
        const panel = document.getElementById('editor-content');
        panel.innerHTML = `
            <h3>Configuración General</h3>
            <div class="row"><label>Color de Fondo</label><input type="color" oninput="updateGlobal('bgColor', this.value)"></div>
            <div class="row"><label>Textura de Fondo</label><select onchange="updateGlobal('texture', this.value)">
                <option value="none">Liso</option>
                <option value="url('https://www.transparenttextures.com/patterns/white-marble.png')">Mármol</option>
                <option value="url('https://www.transparenttextures.com/patterns/handmade-paper.png')">Papel</option>
            </select></div>
            <div class="row"><label>Link Música (MP3 Directo)</label><input type="text" placeholder="https://..." onchange="updateGlobal('music', this.value)"></div>
        `;
        document.getElementById('editor-panel').classList.add('active');
    }

    // FUNCIONES DE ACTUALIZACIÓN
    function updateText(v) { document.getElementById(activeId).innerText = v; }
    function updateStyle(prop, val) { document.getElementById(activeId).style[prop] = val; }
    function updateBtnText(v) { document.getElementById(activeId).querySelector('a').innerText = v; }
    function updateBtnStyle(v) { 
        const btn = document.getElementById(activeId).querySelector('a');
        btn.classList.remove('style-filled', 'style-outline');
        btn.classList.add(v);
    }
    function updateGlobal(type, val) {
        if(type === 'bgColor') document.getElementById('phone').style.backgroundColor = val;
        if(type === 'texture') document.getElementById('main-bg').style.backgroundImage = val;
        if(type === 'music') document.getElementById('bg-audio').src = val;
    }
    function deleteEl() { document.getElementById(activeId).remove(); closeEditor(); }
    function closeEditor() { document.getElementById('editor-panel').classList.remove('active'); }

    // ADICIÓN DE NUEVOS ADORNOS
    function addNewElement(emoji) {
        const id = 'el-' + Date.now();
        const newEl = document.createElement('div');
        newEl.className = 'editable';
        newEl.id = id;
        newEl.style.top = '100px'; newEl.style.left = '100px';
        newEl.style.fontSize = '40px';
        newEl.innerText = emoji;
        document.getElementById('scroll-area').appendChild(newEl);
        initDrag();
    }

    // MÚSICA
    function toggleMusic() {
        const audio = document.getElementById('bg-audio');
        if(audio.paused) { audio.play(); document.getElementById('music-btn').innerText = '🔊'; }
        else { audio.pause(); document.getElementById('music-btn').innerText = '🔇'; }
    }

    initDrag();
</script>
</body>
</html>
