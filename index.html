<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gran día Studio - OMNIPOTENTE 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.14.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Cinzel:wght@400;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --p-width: 480px; --accent: #d4a373; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; display: flex; background: #0f172a; height: 100vh; overflow: hidden; color: #333; }

        /* PANEL DE CONTROL */
        #sidebar { width: var(--p-width); background: #ffffff; box-shadow: 20px 0 60px rgba(0,0,0,0.6); z-index: 100; overflow-y: auto; padding: 25px; box-sizing: border-box; border-right: 5px solid var(--accent); }
        .editor-card { background: #f8fafc; border-radius: 18px; padding: 18px; margin-bottom: 15px; border: 1px solid #e2e8f0; animation: fadeIn 0.3s; }
        h1 { font-family: 'Dancing Script'; color: var(--accent); font-size: 38px; margin: 0 0 5px; text-align: center; }
        
        label { display: block; font-size: 9px; font-weight: 900; color: #64748b; margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 10px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 13px; background: white; outline: none; transition: 0.2s; box-sizing: border-box; }
        input:focus { border-color: var(--accent); }
        
        .flex { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-add { background: #f1f5f9; border: 2px dashed #cbd5e1; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 11px; flex: 1; font-weight: bold; transition: 0.2s; text-align: center; }
        .btn-add:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-main { background: var(--accent); color: white; padding: 18px; width: 100%; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 16px; box-shadow: 0 4px 15px rgba(212, 163, 115, 0.4); }

        /* VISTA PREVIA */
        #preview { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; background: radial-gradient(circle, #334155, #0f172a); }
        #phone { width: 385px; height: 820px; border: 12px solid #000; border-radius: 60px; position: relative; overflow-y: auto; background-color: #fff; background-size: cover; background-attachment: local; box-shadow: 0 50px 100px rgba(0,0,0,0.7); scroll-behavior: smooth; }
        #phone::-webkit-scrollbar { width: 0; }

        /* SECCIONES EDITABLES */
        .sec { padding: 50px 30px; position: relative; display: flex; flex-direction: column; transition: 0.3s; box-sizing: border-box; min-height: 50px; background-size: cover; background-position: center; }
        .sec:hover { outline: 3px solid var(--accent); outline-offset: -3px; }
        .drag-handle { position: absolute; left: 10px; top: 10px; cursor: move; font-size: 20px; color: #ccc; z-index: 50; background: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .e-text { cursor: pointer; transition: 0.2s; line-height: 1.5; }
        .v-card { background: rgba(255,255,255,1); padding: 30px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .v-btn { display: inline-block; padding: 16px 32px; text-decoration: none; font-weight: bold; border-radius: 50px; transition: 0.3s; text-align: center; margin-top: 10px; }
        .v-img { width: 100%; border-radius: 20px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .countdown { display: flex; justify-content: center; gap: 15px; }
        .count-unit { text-align: center; }
        .count-num { font-size: 32px; font-family: 'Oswald'; color: var(--accent); display: block; }

        /* MODO FINAL */
        body.final #sidebar, body.final .drag-handle { display: none !important; }
        body.final #phone { width: 100%; height: auto; border: none; border-radius: 0; max-width: 550px; margin: 0 auto; overflow: visible; box-shadow: none; }
        body.final #preview { background: white; padding: 0; display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<aside id="sidebar">
    <h1>Mi Grandía ✨</h1>
    <div id="editor-container">
        <div class="editor-card">
            <label>🖼️ FONDO TOTAL (CANVAS)</label>
            <div class="flex">
                <input type="color" value="#ffffff" oninput="document.getElementById('phone').style.backgroundColor=this.value; document.getElementById('phone').style.backgroundImage='none'">
                <input type="text" placeholder="URL Imagen (Pared/Mármol)" oninput="document.getElementById('phone').style.backgroundImage='url('+this.value+')'">
            </div>
            <label>Música (ID YouTube)</label>
            <input type="text" id="m-id" value="PwJ8HIDghLg" oninput="updateMusic()" placeholder="Ej: PwJ8HIDghLg">
        </div>

        <label>➕ AÑADIR NUEVAS SECCIONES</label>
        <div class="flex" style="flex-wrap: wrap;">
            <button class="btn-add" onclick="addNew('text')">📝 Texto</button>
            <button class="btn-add" onclick="addNew('img')">🖼️ Imagen</button>
            <button class="btn-add" onclick="addNew('card')">💳 Tarjeta</button>
            <button class="btn-add" onclick="addNew('btn')">🔗 Botón</button>
            <button class="btn-add" onclick="addNew('timer')">⏳ Contador</button>
        </div>
    </div>
    
    <button class="btn-main" onclick="exportInvitation()">💾 DESCARGAR INVITACIÓN LISTA</button>
</aside>

<main id="preview">
    <div id="phone">
        <div id="sortable-area">
            
            <section class="sec" id="s-hero" style="height:500px; background-image:url('https://images.unsplash.com/photo-1519741497674-611481863552?w=800'); justify-content:center; text-align:center;" onclick="openEditor('s-hero', 'Portada', 'sec')">
                <div class="drag-handle">⠿</div>
                <span class="e-text" id="t-names" style="font-family:'Great Vibes'; font-size:3.8rem; color:white; text-shadow:2px 2px 10px rgba(0,0,0,0.8);" onclick="event.stopPropagation(); openEditor('t-names', 'Nombres', 'text')">Sofía & Ale</span>
            </section>

            <section class="sec" id="s-timer" style="text-align:center; background:rgba(255,255,255,0.9);" onclick="openEditor('s-timer', 'Bloque Tiempo', 'sec')">
                <div class="drag-handle">⠿</div>
                <div class="countdown" id="c-wrap">
                    <div class="count-unit"><b class="count-num" id="d">00</b><small>Días</small></div>
                    <div class="count-unit"><b class="count-num" id="h">00</b><small>Hrs</small></div>
                    <div class="count-unit"><b class="count-num" id="m">00</b><small>Min</small></div>
                </div>
                <input type="hidden" id="event-date" value="2026-12-31T20:00">
            </section>

            <section class="sec" id="s-loc" style="text-align:center;" onclick="openEditor('s-loc', 'Bloque Ubicación', 'sec')">
                <div class="drag-handle">⠿</div>
                <div class="v-card" id="c-loc" onclick="event.stopPropagation(); openEditor('c-loc', 'Tarjeta Mapa', 'card')">
                    <b class="e-text" id="t-loc-tit" style="font-size:1.2rem; display:block; margin-bottom:10px;" onclick="event.stopPropagation(); openEditor('t-loc-tit', 'Título Mapa', 'text')">RECEPCIÓN</b>
                    <a href="#" id="b-map" class="v-btn" style="background:var(--accent); color:white;" onclick="event.stopPropagation(); openEditor('b-map', 'Botón Mapa', 'btn')">VER UBICACIÓN</a>
                </div>
            </section>

        </div>
    </div>
</main>

<script>
    new Sortable(document.getElementById('sortable-area'), { animation: 150, handle: '.drag-handle' });

    function openEditor(id, label, type) {
        const el = document.getElementById(id);
        const container = document.getElementById('editor-container');
        let html = `<div class="editor-card"><h3>⚙️ ${label}</h3>`;
        
        if (type === 'sec') {
            html += `<label>Fondo de Bloque</label><div class="flex">
                <input type="color" oninput="document.getElementById('${id}').style.backgroundColor=this.value">
                <input type="range" min="0" max="100" value="100" oninput="document.getElementById('${id}').style.backgroundColor=hexToRgba(rgbToHex(window.getComputedStyle(el).backgroundColor), this.value/100)">
            </div>
            <label>Imagen Fondo</label><input type="text" placeholder="URL Imagen" oninput="document.getElementById('${id}').style.backgroundImage='url('+this.value+')'">
            <label>Altura (px)</label><input type="number" oninput="document.getElementById('${id}').style.height=this.value+'px'">
            <label>Padding</label><input type="range" min="0" max="150" value="50" oninput="document.getElementById('${id}').style.padding=this.value+'px 30px'">`;
        } 
        else if (type === 'text') {
            html += `<label>Contenido</label><textarea rows="3" oninput="document.getElementById('${id}').innerText=this.value">${el.innerText}</textarea>
            <label>Fuente</label><select onchange="document.getElementById('${id}').style.fontFamily=this.value">
                <option value="'Montserrat'">Montserrat</option><option value="'Great Vibes'">Great Vibes</option>
                <option value="'Cinzel'">Cinzel</option><option value="'Dancing Script'">Dancing Script</option>
            </select>
            <div class="flex">
                <div><label>Color</label><input type="color" oninput="document.getElementById('${id}').style.color=this.value"></div>
                <div><label>Tamaño</label><input type="number" value="${parseInt(window.getComputedStyle(el).fontSize)}" oninput="document.getElementById('${id}').style.fontSize=this.value+'px'"></div>
            </div>`;
        }
        else if (type === 'card') {
            html += `<label>Color Tarjeta</label><input type="color" oninput="document.getElementById('${id}').style.backgroundColor=this.value">
            <label>Redondeo</label><input type="range" min="0" max="80" oninput="document.getElementById('${id}').style.borderRadius=this.value+'px'">`;
        }
        else if (type === 'btn') {
            html += `<label>Texto</label><input type="text" value="${el.innerText}" oninput="document.getElementById('${id}').innerText=this.value">
            <label>Color Fondo</label><input type="color" oninput="document.getElementById('${id}').style.backgroundColor=this.value">
            <label>Color Letra</label><input type="color" value="#ffffff" oninput="document.getElementById('${id}').style.color=this.value">`;
        }
        else if (type === 'img') {
            html += `<label>URL Imagen</label><input type="text" value="${el.src}" oninput="document.getElementById('${id}').src=this.value">
            <label>Redondeo</label><input type="range" min="0" max="100" oninput="document.getElementById('${id}').style.borderRadius=this.value+'px'">`;
        }

        html += `<button style="background:#fee2e2; color:red; border:none; padding:10px; width:100%; border-radius:10px; cursor:pointer; margin-top:20px; font-weight:bold;" onclick="if(confirm('¿Borrar bloque?')) document.getElementById('${id.startsWith('s-')?id:el.closest('.sec').id}').remove()">🗑️ ELIMINAR</button></div>`;
        container.innerHTML = html;
    }

    function addNew(type) {
        const id = 's-' + Date.now();
        const area = document.getElementById('sortable-area');
        const sec = document.createElement('section');
        sec.className = 'sec'; sec.id = id;
        sec.onclick = () => openEditor(id, 'Nueva Sección', 'sec');
        let content = `<div class="drag-handle">⠿</div>`;
        if(type === 'text') content += `<p class="e-text" id="t-${id}" onclick="event.stopPropagation(); openEditor('t-${id}', 'Texto', 'text')">Nuevo Texto...</p>`;
        if(type === 'img') content += `<img src="https://via.placeholder.com/400x300" class="v-img" id="i-${id}" onclick="event.stopPropagation(); openEditor('i-${id}', 'Imagen', 'img')">`;
        if(type === 'card') content += `<div class="v-card" id="c-${id}" onclick="event.stopPropagation(); openEditor('c-${id}', 'Tarjeta', 'card')"><p class="e-text" id="tc-${id}" onclick="event.stopPropagation(); openEditor('tc-${id}', 'Contenido', 'text')">Nueva Tarjeta</p></div>`;
        if(type === 'btn') content += `<div style="text-align:center;"><a href="#" class="v-btn" id="b-${id}" style="background:var(--accent); color:white;" onclick="event.stopPropagation(); openEditor('b-${id}', 'Botón', 'btn')">Nuevo Botón</a></div>`;
        if(type === 'timer') content += `<div class="countdown"><div class="count-unit"><b class="count-num">00</b><small>Días</small></div></div>`;
        sec.innerHTML = content; area.appendChild(sec);
    }

    function updateMusic() {
        const id = document.getElementById('m-id').value;
        const old = document.getElementById('p-m'); if(old) old.remove();
        const div = document.createElement('div'); div.id = 'p-m';
        div.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay" style="display:none"></iframe>`;
        document.body.appendChild(div);
    }

    function startTimer() {
        const target = new Date(document.getElementById('event-date').value).getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            if(diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff/86400000).toString().padStart(2,'0');
                document.getElementById('h').innerText = Math.floor((diff%86400000)/3600000).toString().padStart(2,'0');
                document.getElementById('m').innerText = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
            }
        }, 1000);
    }

    function rgbToHex(rgb) {
        if(!rgb || rgb.includes('rgba(0, 0, 0, 0)')) return "#ffffff";
        let res = rgb.match(/\d+/g);
        return "#" + ((1 << 24) + (parseInt(res[0]) << 16) + (parseInt(res[1]) << 8) + parseInt(res[2])).toString(16).slice(1);
    }

    function hexToRgba(hex, alpha) {
        let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function exportInvitation() {
        document.body.classList.add('final');
        const finalHtml = `<!DOCTYPE html><html><head>${document.head.innerHTML}</head><body style="margin:0;">${document.getElementById('phone').outerHTML}</body></html>`.replace(/<script[\s\S]*?<\/script>/g, '').replace(/drag-handle/g, 'hidden');
        const blob = new Blob([finalHtml], {type: 'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'invitacion_final.html'; a.click();
        document.body.classList.remove('final');
    }
    startTimer();
</script>
</body>
</html>
