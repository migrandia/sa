<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Gran Día - Constructor</title>
<style>
body{margin:0;font-family:Arial;background:#f2f2f2}
#app{display:flex;min-height:100vh}
#panel{width:320px;background:white;padding:15px;overflow:auto}
#preview{flex:1;padding:20px}
.phone{max-width:360px;margin:auto;background:white;border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.2)}
.hero img{width:100%;height:220px;object-fit:cover}
.content{padding:20px;text-align:center}
.btn{display:block;margin:10px auto;padding:10px;background:#000;color:white;text-decoration:none;border-radius:20px;width:85%}
.gallery img{width:100%;margin-bottom:10px;border-radius:10px}
</style>
</head>
<body>

<div id="app">
<div id="panel">
<h3>Mi Gran Día</h3>

<label>Nombres</label>
<input id="names" oninput="update()" style="width:100%">

<label>WhatsApp</label>
<input id="phone" oninput="update()" style="width:100%">

<label>Google Maps</label>
<input id="map" oninput="update()" style="width:100%">

<label>Fecha</label>
<input type="date" id="date" onchange="updateCountdown()" style="width:100%">

<label>Hora</label>
<input type="time" id="hour" onchange="updateCountdown()" style="width:100%">

<label>Portada</label>
<input type="file" onchange="uploadCover(event)">

<label>Galería</label>
<input type="file" multiple onchange="uploadGallery(event)">

<button onclick="save()">Guardar invitación</button>
<div id="link"></div>

</div>

<div id="preview">
<div class="phone">
<div class="hero"><img id="cover"></div>
<div class="content">
<h2 id="v-names"></h2>
<div id="countdown"></div>
<a id="mapBtn" class="btn">Ver ubicación</a>
<a id="wsp" class="btn">Confirmar asistencia</a>
<div class="gallery" id="gallery"></div>
</div>
</div>
</div>

<script>

function update(){
document.getElementById('v-names').innerText = names.value;
document.getElementById('wsp').href = "https://wa.me/"+phone.value;
document.getElementById('mapBtn').href = map.value;
}

function uploadCover(e){
let reader = new FileReader();
reader.onload = ()=> cover.src = reader.result;
reader.readAsDataURL(e.target.files[0]);
}

function uploadGallery(e){
gallery.innerHTML="";
Array.from(e.target.files).forEach(file=>{
let reader=new FileReader();
reader.onload=()=>{
let img=document.createElement("img");
img.src=reader.result;
gallery.appendChild(img);
};
reader.readAsDataURL(file);
});
}

function updateCountdown(){
let event=new Date(date.value+"T"+hour.value);
setInterval(()=>{
let diff=event-new Date();
let d=Math.floor(diff/1000/60/60/24);
let h=Math.floor(diff/1000/60/60)%24;
countdown.innerText=d+" días "+h+" hrs";
},1000);
}

function save(){
let id="inv-"+Date.now();
let data={
names:names.value,
phone:phone.value,
map:map.value,
cover:cover.src,
gallery:gallery.innerHTML
};
localStorage.setItem(id,JSON.stringify(data));
link.innerHTML="Link generado: "+location.href+"?view="+id;
}

let params=new URLSearchParams(location.search);
if(params.get("view")){
let d=JSON.parse(localStorage.getItem(params.get("view")));
document.getElementById("panel").style.display="none";
document.getElementById("v-names").innerText=d.names;
document.getElementById("wsp").href="https://wa.me/"+d.phone;
document.getElementById("mapBtn").href=d.map;
document.getElementById("cover").src=d.cover;
document.getElementById("gallery").innerHTML=d.gallery;
}

</script>

</body>
</html>
