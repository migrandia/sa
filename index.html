<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Gran Día - Editor Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --dark: #1a1a1a; --glass: rgba(255, 255, 255, 0.98); }
        
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        
        /* ESCENARIO DE TRABAJO */
        #editor-canvas { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; background: radial-gradient(#333 1px, #111 1px); background-size: 30px 30px;
        }

        /* EL CELULAR */
        #phone { 
            width: 100%; max-width: 400px; height: 90vh; background: #fff; 
            position: relative; border-radius: 45px; overflow: hidden;
            border: 8px solid #222; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* FONDO DINÁMICO (COLORES Y TEXTURAS) */
        #fixed-bg { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            z-index: 1; pointer-events: none; background-size: cover; opacity: 0.5;
        }

        #scroll-area { position: relative; z-index: 2; height: 100%; overflow-y: auto; overflow-x: hidden; }

        /* ELEMENTOS EDITABLES */
        .editable { 
            cursor: move; position: absolute; z-index: 10; user-select: none; 
            touch-action: none; transition: outline 0.2s; min-width: 50px;
        }
        .editable:hover { outline: 2px dashed var(--gold); outline-offset: 5px; }

        /* ESTILOS DE BOTÓN (REQUERIMIENTO: 2 ESTILOS) */
        .v-btn { padding: 15px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; display: inline-block; transition: 0.3s; border: 2px solid transparent; text-align: center; }
        .btn-filled { background: var(--gold); color: white; }
        .btn-outline { background: transparent; border-color: var(--gold); color: var(--gold); }

        /* REPRODUCTOR CASI INVISIBLE */
        #music-trigger { position: absolute; top: 20px; right: 20px; z-index: 1000; opacity: 0.3; cursor: pointer; font-size: 20px; }

        /* SECCIONES (ANCLAJES) */
        .section-anchor { height: 400px; width: 100%; position: relative; border-bottom: 1px dashed rgba(0,0,0,0.05); }

        /* EDITOR BOTTOM SHEET */
        #editor-panel { 
            position: fixed; bottom: -100%; left: 0; width: 100%; 
            background: var(--glass); z-index: 5000; border-radius: 25px 25px 0 0;
            padding: 25px; box-sizing: border-box; box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
            transition: 0.4s cubic-bezier(0.1, 0.8, 0.1, 1);
        }
        #editor-panel.active { bottom: 0; }
        .handle { width: 40px; height: 4px; background: #ddd; border-radius: 10px; margin: -10px auto 15px; }

        /* CONTROLES */
        .row { margin-bottom: 12px; }
        label { font-size: 10px; font-weight: bold; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .f-btn { position: fixed; bottom: 20px; left: 20px; width: 50px; height: 50px; background: var(--gold); color: #fff; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; z-index: 4000; }
        #bg-config { position: fixed; bottom: 20px; right: 20px; background: #000; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; cursor: pointer; z-index: 4000; }
    </style>
</head>
<body onclick="startMusicOnce()">

<div id="music-trigger">🔇</div>
<audio id="bg-audio" loop></audio>

<button class="f-btn" onclick="addSticker('🌸')">+</button>
<div id="bg-config" onclick="openGlobalEditor()">FONDO Y MÚSICA</div>

<div id="editor-canvas">
    <div id="phone">
        <div id="fixed-bg"></div>
        <div id="scroll-area">
            
            <div class="section-anchor" id="sec-1">
                <div class="editable" id="el-nombres" style="font-family:'Great Vibes'; font-size:3.5rem; top:100px; left:50%; transform:translateX(-50%); width:100%; text-align:center;">Cecilia & Ruben</div>
                <div class="editable" id="el-slogan" style="font-size:12px; letter-spacing:4px; top:180px; left:50%; transform:translateX(-50%);">¡NUESTRA BODA!</div>
            </div>

            <div class="section-anchor" id="sec-2" style="height: 250px;">
                <div class="editable" id="el-timer-title" style="top:20px; left:50%; transform:translateX(-50%); font-weight:bold;">FALTA MUY POCO:</div>
                <div class="editable" id="el-timer-box" style="top:60px; left:50%; transform:translateX(-50%); font-size:2rem; font-family:'Cinzel'; color:var(--gold); width:100%; text-align:center;">00:00:00:00</div>
                <input type="datetime-local" id="hidden-date" style="display:none;" onchange="updateTargetDate(this.value)">
            </div>

            <div class="section-anchor" id="sec-3">
                <div class="editable btn-wrap" id="el-btn-rsvp" style="top:50px; left:50%; transform:translateX(-50%); width:80%;">
                    <a href="#" class="v-btn btn-filled" style="width:100%;">CONFIRMAR ASISTENCIA</a>
                </div>
            </div>

        </div>
    </div>
</div>

<div id="editor-panel">
    <div class="handle" onclick="closeEditor()"></div>
    <div id="ui-content"></div>
    <button onclick="closeEditor()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; border-radius:12px; margin-top:10px; font-weight:bold;">GUARDAR CAMBIOS</button>
</div>

<script>
    let activeId = null;
    let isMoving = false;
    let audioStarted = false;

    // INICIAR MOVIMIENTO LIBRE
    function initDrag() {
        const items = document.querySelectorAll('.editable');
        items.forEach(el => {
            el.onmousedown = startDrag;
            el.ontouchstart = startDrag;
            el.onclick = (e) => { 
                if(!isMoving) openElementEditor(el.id); 
                e.stopPropagation();
            };
        });
    }

    function startDrag(e) {
        isMoving = false;
        const el = this;
        let startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        let startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
        let initialTop = el.offsetTop;
        let initialLeft = el.offsetLeft;

        document.onmousemove = document.ontouchmove = (ev) => {
            isMoving = true;
            let moveX = (ev.type === 'touchmove' ? ev.touches[0].clientX : ev.clientX) - startX;
            let moveY = (ev.type === 'touchmove' ? ev.touches[0].clientY : ev.clientY) - startY;
            el.style.top = (initialTop + moveY) + 'px';
            el.style.left = (initialLeft + moveX) + 'px';
            el.style.transform = 'none'; // Quitar centrado al mover libremente
        };

        document.onmouseup = document.ontouchend = () => {
            document.onmousemove = document.ontouchmove = null;
            saveAll();
        };
    }

    // EDITOR DE ELEMENTOS
    function openElementEditor(id) {
        activeId = id;
        const el = document.getElementById(id);
        const ui = document.getElementById('ui-content');
        let html = `<h3 style="margin:0 0 15px 0; color:var(--gold)">Editar Elemento</h3>`;

        // Si es texto
        if(!el.classList.contains('btn-wrap') && id !== 'el-timer-box') {
            html += `<div class="row"><label>Texto</label><textarea oninput="updateVal('${id}', this.value)">${el.innerText}</textarea></div>`;
        }

        // Si es el Contador (REQUERIMIENTO: Calendario Oculto)
        if(id === 'el-timer-box') {
            html += `<div class="row"><label>Cambiar Fecha del Evento</label><input type="datetime-local" value="${localStorage.getItem('targetDate')}" onchange="updateTargetDate(this.value)"></div>`;
        }

        // Si es un Botón (REQUERIMIENTO: 2 Estilos)
        if(el.classList.contains('btn-wrap')) {
            const btn = el.querySelector('a');
            html += `<div class="row"><label>Texto del Botón</label><input type="text" value="${btn.innerText}" oninput="updateBtnText(this.value)"></div>`;
            html += `<div class="row"><label>Estilo del Botón</label><select onchange="updateBtnStyle(this.value)">
                <option value="btn-filled" ${btn.classList.contains('btn-filled')?'selected':''}>Estilo 1: Relleno</option>
                <option value="btn-outline" ${btn.classList.contains('btn-outline')?'selected':''}>Estilo 2: Contorno</option>
            </select></div>`;
        }

        // Controles comunes: Fuente, Color, Capa (Z-index)
        html += `<div class="grid">
            <div class="row"><label>Color</label><input type="color" oninput="updateCSS('color', this.value)"></div>
            <div class="row"><label>Tamaño</label><input type="text" placeholder="20px" oninput="updateCSS('fontSize', this.value)"></div>
        </div>`;
        html += `<div class="row"><label>Capa (Orden)</label><select onchange="updateCSS('zIndex', this.value)">
            <option value="10">Normal</option><option value="1">Atrás</option><option value="100">Al Frente</option>
        </select></div>`;

        ui.innerHTML = html;
        document.getElementById('editor-panel').classList.add('active');
    }

    function openGlobalEditor() {
        const ui = document.getElementById('ui-content');
        ui.innerHTML = `
            <h3 style="color:var(--gold)">Fondo y Música</h3>
            <div class="row"><label>Color de Fondo</label><input type="color" oninput
