<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gran día Studio - Editor Infinito</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #d4a373; --btn-bg: #d4a373; --btn-text: #ffffff; 
            --btn-radius: 30px; --font-title: 'Great Vibes';
            --bg-color: #ffffff; --bg-img: none;
        }
        body { font-family: 'Montserrat', sans-serif; margin: 0; display: flex; background: #e2e8f0; height: 100vh; overflow: hidden; }

        /* PANEL EDITOR */
        #panel { width: 450px; background: white; padding: 25px; overflow-y: auto; box-shadow: 5px 0 20px rgba(0,0,0,0.1); z-index: 10; }
        .block-edit { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; position: relative; border-left: 5px solid var(--accent); }
        .btn-trash { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
        
        .add-menu { display: flex; gap: 10px; margin-bottom: 30px; background: #f0f4f8; padding: 15px; border-radius: 12px; flex-wrap: wrap; }
        .btn-add { flex: 1; padding: 10px; background: white; border: 1px dashed var(--accent); color: var(--accent); border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .btn-add:hover { background: var(--accent); color: white; }

        h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-top: 5px; font-size: 12px; }

        /* VISTA PREVIA */
        #viewport { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #phone { 
            width: 370px; height: 780px; border: 12px solid #111; border-radius: 45px; 
            background-color: var(--bg-color); background-image: var(--bg-img);
            overflow-y: auto; overflow-x: hidden; position: relative; scroll-behavior: smooth;
        }

        /* BLOQUES DE INVITACIÓN */
        .v-section { padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.02); }
        .v-text { font-size: 14px; color: #555; line-height: 1.6; }
        .v-img { width: 100%; border-radius: 10px; margin: 15px 0; }
        .btn-custom { 
            display: block; width: 85%; margin: 15px auto; padding: 15px; 
            background: var(--btn-bg); color: var(--btn-text); border-radius: var(--btn-radius);
            text-decoration: none; font-weight: bold; font-size: 11px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<aside id="panel">
    <h1>Mi Grandía Studio ✨</h1>
    <p style="font-size: 12px; color: #777;">Añade secciones personalizadas a tu invitación.</p>

    <div class="add-menu">
        <button class="btn-add" onclick="addBlock('texto')">+ TEXTO</button>
        <button class="btn-add" onclick="addBlock('foto')">+ FOTO</button>
        <button class="btn-add" onclick="addBlock('boton')">+ BOTÓN</button>
    </div>

    <div id="editor-container">
        </div>

    <button onclick="window.print()" style="width:100%; padding: 20px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px;">
        GENERAR INVITACIÓN 📥
    </button>
</aside>

<main id="viewport">
    <div id="phone">
        <section class="v-section" style="height:450px; display:flex; flex-direction:column; justify-content:center; background:url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=500&q=80') center/cover; color:white;">
            <div data-aos="fade-down">
                <h1 style="font-family: 'Great Vibes'; font-size: 3.5rem; margin:0;">Nuestra Boda</h1>
                <p>TE ESPERAMOS</p>
            </div>
        </section>

        <div id="invitation-content">
            </div>
    </div>
</main>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();
    let blockCount = 0;

    function addBlock(type) {
        blockCount++;
        const id = `block-${blockCount}`;
        
        // 1. Crear control en el panel
        const control = document.createElement('div');
        control.className = 'block-edit';
        control.id = `edit-${id}`;
        
        let controlHTML = `<button class="btn-trash" onclick="removeBlock('${id}')">🗑️</button><h2>Bloque de ${type.toUpperCase()}</h2>`;
        
        if(type === 'texto') {
            controlHTML += `<textarea oninput="updateText('${id}', this.value)" placeholder="Escribe tu mensaje aquí...">Nuevo Mensaje</textarea>`;
        } else if(type === 'foto') {
            controlHTML += `<input type="text" oninput="updateImg('${id}', this.value)" placeholder="URL de la imagen (Google Fotos/Imgur)">`;
        } else if(type === 'boton') {
            controlHTML += `<input type="text" oninput="updateBtn('${id}', this.value)" placeholder="Texto del botón">`;
        }

        control.innerHTML = controlHTML;
        document.getElementById('editor-container').appendChild(control);

        // 2. Crear sección en la invitación
        const section = document.createElement('section');
        section.className = 'v-section';
        section.id = `view-${id}`;
        section.setAttribute('data-aos', 'fade-up');
        
        if(type === 'texto') {
            section.innerHTML = `<p class="v-text" id="content-${id}">Nuevo Mensaje</p>`;
        } else if(type === 'foto') {
            section.innerHTML = `<img src="https://via.placeholder.com/400x250" class="v-img" id="content-${id}">`;
        } else if(type === 'boton') {
            section.innerHTML = `<a href="#" class="btn-custom" id="content-${id}">NUEVO BOTÓN</a>`;
        }

        document.getElementById('invitation-content').appendChild(section);
        AOS.refresh(); // Reiniciar animaciones para el nuevo bloque
    }

    // Funciones de actualización
    function updateText(id, val) { document.getElementById(`content-${id}`).innerText = val; }
    function updateImg(id, val) { document.getElementById(`content-${id}`).src = val; }
    function updateBtn(id, val) { document.getElementById(`content-${id}`).innerText = val; }

    function removeBlock(id) {
        document.getElementById(`edit-${id}`).remove();
        document.getElementById(`view-${id}`).remove();
    }
</script>

</body>
</html>
