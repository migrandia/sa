<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grandía Studio - Cecilia Landa</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.14.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@400;700&family=Cinzel:wght@400;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --p-width: 400px; --gold: #b8860b; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; display: flex; background: #111; height: 100vh; overflow: hidden; }

        /* PANEL EDITOR IZQUIERDO RESTAURADO */
        #sidebar { width: var(--p-width); background: #fff; z-index: 100; overflow-y: auto; padding: 20px; border-right: 5px solid var(--gold); box-shadow: 5px 0 15px rgba(0,0,0,0.3); }
        .editor-card { background: #fdfaf6; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--gold); }
        h1 { font-family: 'Dancing Script'; color: var(--gold); text-align: center; margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 900; color: #64748b; margin: 10px 0 4px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }

        /* VISTA PREVIA */
        #preview { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #222; position: relative; }
        #phone-container { width: 375px; height: 780px; border: 12px solid #000; border-radius: 50px; background: #fff; overflow: hidden; position: relative; }
        #phone { width: 100%; height: 100%; overflow-y: scroll; overflow-x: hidden; position: relative; background-image: url('https://www.transparenttextures.com/patterns/white-marble.png'); }

        /* SOMBRAS EN TODOS LOS TEXTOS */
        .e-text, .movable, b, p, span, h2 { text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }

        /* SECCIONES */
        .sec { padding: 60px 20px; position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; background-size: cover; background-position: center; width: 100%; box-sizing: border-box; min-height: 200px; }
        .drag-handle { position: absolute; left: 10px; top: 10px; cursor: move; background: #fff; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; z-index: 90; opacity: 0.5; }
        
        /* SISTEMA DE MOVIMIENTO LIBRE (TODOS LOS OBJETOS) */
        .movable { position: relative; cursor: move; z-index: 10; touch-action: none; user-select: none; transition: transform 0.1s; }
        .movable:active { transform: scale(1.05); z-index: 100; }

        /* CONTADOR */
        .countdown { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .c-unit { text-align: center; min-width: 55px; background: rgba(255,255,255,0.85); padding: 5px; border-radius: 8px; }
        .c-num { font-size: 22px; font-family: 'Oswald'; color: var(--gold); display: block; text-shadow: none !important; }
        .c-label { font-size: 9px; text-transform: uppercase; font-weight: bold; text-shadow: none !important; color: #333; }

        .v-card { background: rgba(255,255,255,0.95); padding: 20px; border-radius: 15px; width: 100%; box-sizing: border-box; border: 1px solid #eee; margin-top: 10px; }
        .v-img { width: 100%; border-radius: 12px; object-fit: cover; height: 200px; }
        .v-btn { display: inline-block; padding: 12px 25px; text-decoration: none; font-weight: bold; border-radius: 30px; color: #fff; text-shadow: none !important; }
    </style>
</head>
<body>

<aside id="sidebar">
    <h1>Grandía Studio ✨</h1>
    <div class="editor-card">
        <label>📅 Fecha del Evento</label>
        <input type="datetime-local" id="event-date" value="2026-12-31T20:00" oninput="saveAll()">
        <label>🎨 Fondo del Celular</label>
        <input type="color" id="bg-col" value="#ffffff" oninput="updateBg()">
    </div>
    <div id="editor-dynamic">
        <p style="text-align:center; color:#999; font-size:11px; padding:10px;">Toca cualquier texto, foto o botón para editarlo.</p>
    </div>
    <button style="background:var(--gold); color:white; padding:15px; width:100%; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:10px;" onclick="saveAll()">💾 GUARDAR PROGRESO</button>
</aside>

<main id="preview">
    <div id="phone-container">
        <div id="phone">
            <div id="sortable-area">
                
                <section class="sec" id="s1" style="height:500px; background-image:url('https://images.unsplash.com/photo-1519741497674-611481863552?w=800');">
                    <div class="drag-handle">⠿</div>
                    <div class="movable" id="t1" style="font-family:'Great Vibes'; font-size:3.5rem; color:#fff;" onclick="openEditor('t1', 'text')">Sofía & Ale</div>
                    <div class="movable" id="t2" style="font-family:'Montserrat'; color:#fff; letter-spacing:4px; font-weight:bold; margin-top:20px;" onclick="openEditor('t2', 'text')">¡NOS CASAMOS!</div>
                </section>

                <section class="sec" id="s2">
                    <div class="drag-handle">⠿</div>
                    <span class="movable" id="t_f" onclick="openEditor('t_f', 'text')">FALTAN:</span>
                    <div class="countdown movable" id="timer_obj">
                        <div class="c-unit"><b class="c-num" id="days">00</b><span class="c-label">Días</span></div>
                        <div class="c-unit"><b class="c-num" id="hours">00</b><span class="c-label">Hrs</span></div>
                        <div class="c-unit"><b class="c-num" id="mins">00</b><span class="c-label">Min</span></div>
                        <div class="c-unit" style="border: 1px solid var(--gold);"><b class="c-num" id="secs">00</b><span class="c-label">Seg</span></div>
                    </div>
                </section>

                <section class="sec" id="s_parents">
                    <div class="drag-handle">⠿</div>
                    <b class="movable" id="t_p" style="color:var(--gold); font-family:'Cinzel';" onclick="openEditor('t_p', 'text')">Con la bendición de nuestros padres</b>
                    <div class="v-card movable" id="card_p" onclick="openEditor('card_p', 'text')">
                        Emperatriz Landa & Rubén Pérez<br>---<br>María García & Juan López
                    </div>
                </section>

                <section class="sec" id="s_extra">
                    <div class="drag-handle">⠿</div>
                    <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=600" class="v-img movable" id="i_extra" onclick="openEditor('i_extra', 'img')">
                </section>

                <section class="sec" id="s_wa">
                    <div class="drag-handle">⠿</div>
                    <a href="https://wa.me/9911105456" class="v-btn movable" id="b_wa" style="background:#25D366; width:100%;" onclick="openEditor('b_wa', 'btn')">CONFIRMAR ASISTENCIA</a>
                </section>

            </div>
        </div>
    </div>
</main>

<script>
    // SISTEMA DE MOVIMIENTO LIBRE PARA TODO
    function initMovable(el) {
        let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
        el.onmousedown = dragStart; el.ontouchstart = dragStart;

        function dragStart(e) {
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            p3 = e.clientX || e.touches[0].clientX;
            p4 = e.clientY || e.touches[0].clientY;
            document.onmouseup = dragEnd; document.ontouchend = dragEnd;
            document.onmousemove = dragMove; document.ontouchmove = dragMove;
        }
        function dragMove(e) {
            let cx = e.clientX || e.touches[0].clientX;
            let cy = e.clientY || e.touches[0].clientY;
            p1 = p3 - cx; p2 = p4 - cy; p3 = cx; p4 = cy;
            el.style.top = (el.offsetTop - p2) + "px";
            el.style.left = (el.offsetLeft - p1) + "px";
        }
        function dragEnd() {
            document.onmouseup = null; document.onmousemove = null;
            document.ontouchend = null; document.ontouchmove = null;
            saveAll();
        }
    }

    // APLICAR MOVIMIENTO A TODO LO QUE TENGA CLASE "MOVABLE"
    function applyAllMoves() {
        document.querySelectorAll('.movable').forEach(initMovable);
    }

    // EDITOR DINAMICO RESTAURADO
    function openEditor(id, type) {
        const el = document.getElementById(id);
        let html = `<div class="editor-card"><h3>Editando: ${id}</h3>`;
        
        if(type === 'text') {
            html += `<label>Contenido</label><textarea oninput="document.getElementById('${id}').innerHTML=this.value.replace(/\\n/g,'<br>'); saveAll()">${el.innerHTML.replace(/<br>/g, '\n')}</textarea>`;
            html += `<label>Tamaño Letra</label><input type="number" oninput="document.getElementById('${id}').style.fontSize=this.value+'px'; saveAll()">`;
        } else if(type === 'img') {
            html += `<label>URL de Imagen</label><input type="text" value="${el.src}" oninput="document.getElementById('${id}').src=this.value; saveAll()">`;
        } else if(type === 'btn') {
            html += `<label>Texto Botón</label><input type="text" value="${el.innerText}" oninput="document.getElementById('${id}').innerText=this.value; saveAll()">`;
            html += `<label>Link (WhatsApp/Mapa)</label><input type="text" value="${el.href}" oninput="document.getElementById('${id}').href=this.value; saveAll()">`;
        }
        
        html += `<label>Color</label><input type="color" oninput="document.getElementById('${id}').style.color=this.value; saveAll()"></div>`;
        document.getElementById('editor-dynamic').innerHTML = html;
    }

    function updateBg() {
        document.getElementById('phone').style.backgroundColor = document.getElementById('bg-col').value;
        saveAll();
    }

    function saveAll() {
        localStorage.setItem('cecilia_html', document.getElementById('sortable-area').innerHTML);
        localStorage.setItem('cecilia_date', document.getElementById('event-date').value);
    }

    // CONTADOR Y SORTABLE
    function startApp() {
        const saved = localStorage.getItem('cecilia_html');
        if(saved) document.getElementById('sortable-area').innerHTML = saved;
        
        applyAllMoves();
        new Sortable(document.getElementById('sortable-area'), { handle: '.drag-handle', animation: 150 });

        setInterval(() => {
            const diff = new Date(document.getElementById('event-date').value) - new Date();
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / 864e5);
                document.getElementById('hours').innerText = Math.floor((diff % 864e5) / 36e5);
                document.getElementById('mins').innerText = Math.floor((diff % 36e5) / 6e4);
                document.getElementById('secs').innerText = Math.floor((diff % 6e4) / 1000);
            }
        }, 1000);
    }

    window.onload = startApp;
</script>
</body>
</html>
