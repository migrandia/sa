<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Creador Profesional - Mi Gran Día</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --dark: #1a1a1a; --glass: rgba(255, 255, 255, 0.98); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Montserrat', sans-serif; overflow: hidden; user-select: none; }
        #editor-frame { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; background: radial-gradient(#333 1px, #111 1px); background-size: 30px 30px; }
        #phone-container { width: 100%; max-width: 414px; height: 92vh; background: #fff; position: relative; border-radius: 50px; overflow: hidden; border: 10px solid #222; box-shadow: 0 0 100px rgba(0,0,0,0.8); }
        #fixed-bg { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; pointer-events: none; background-size: cover; background-position: center; }
        #scroll-content { position: relative; z-index: 2; height: 100%; overflow-y: auto; scroll-behavior: smooth; }
        .sec { padding: 80px 25px; min-height: 250px; position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .editable { cursor: move; transition: outline 0.2s; position: absolute; z-index: 10; max-width: 90%; touch-action: none; }
        .editable:hover { outline: 2px dashed var(--gold); outline-offset: 8px; }
        .v-img { width: 100%; border-radius: 10px; pointer-events: none; }
        .v-btn { padding: 18px 35px; text-decoration: none; font-weight: bold; display: block; width: 85%; margin: 10px auto; border: none; font-size: 14px; pointer-events: none; }
        #music-player { position: absolute; top: 15px; right: 15px; z-index: 1000; background: rgba(0,0,0,0.2); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: #fff; }
        #bottom-editor { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--glass); z-index: 5000; border-radius: 30px 30px 0 0; padding: 30px; box-sizing: border-box; box-shadow: 0 -15px 40px rgba(0,0,0,0.4); transition: 0.4s; color: #333; }
        #bottom-editor.open { bottom: 0; }
        .input-row { margin-bottom: 15px; text-align: left; }
        label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #666; display: block; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .btn-action { background: #000; color: #fff; padding: 15px; border: none; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .floating-save { position: fixed; top: 20px; left: 20px; background: #000; color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; z-index: 4000; font-weight: bold; border: 2px solid var(--gold); }
    </style>
</head>
<body onclick="tryPlay()">
    <div id="music-player" onclick="toggleMusic(event)"> 🔇 </div>
    <audio id="main-audio" loop></audio>
    <div class="floating-save" onclick="processExport()">DESCARGAR HTML</div>

    <div id="editor-frame">
        <div id="phone-container">
            <div id="fixed-bg"></div>
            <div id="scroll-content">
                <div id="full-inventory">
                    <section class="sec" style="height: 70vh;">
                        <div class="editable" id="s1-t1" style="font-family:'Great Vibes'; font-size:4rem; top: 50px; left:50%; transform:translateX(-50%);">Cecilia & Ruben</div>
                        <div class="editable" id="s1-t2" style="letter-spacing:5px; font-weight:700; font-size:12px; top: 130px; left:50%; transform:translateX(-50%);">¡NUESTRA BODA!</div>
                        <div class="editable" id="s1-img" style="top: 180px; width: 85%; left:50%; transform:translateX(-50%);">
                            <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=600" class="v-img">
                        </div>
                    </section>

                    <section class="sec">
                        <div class="editable" id="s2-t1" style="top:20px; left:50%; transform:translateX(-50%);">FALTAN SOLO:</div>
                        <div id="timer-display" style="font-size: 2.5rem; font-weight: bold; color: var(--gold); font-family: 'Playfair Display'; margin-top: 50px;">00d 00h 00m 00s</div>
                        <input type="datetime-local" id="target-date" value="2026-12-31T20:00" style="margin-top:20px;">
                    </section>

                    <section class="sec">
                        <div class="editable" id="s-story-body" style="top:20px; left:50%; transform:translateX(-50%); width:80%;">
                            <b style="color:var(--gold); font-family:'Cinzel';">NUESTRA HISTORIA</b><br>
                            Un día nos encontramos y supimos que era para siempre.
                        </div>
                    </section>

                    <section class="sec">
                        <div class="editable" id="s5-t1" style="top:20px; left:50%; transform:translateX(-50%); width:85%;">
                            <b style="color:var(--gold); font-family:'Cinzel';">NUESTROS PADRES</b><br><br>
                            Emperatriz Landa & Rubén Pérez <br>---<br>Familia del Novio
                        </div>
                    </section>

                    <section class="sec">
                        <div class="editable" id="s17-b1" style="bottom:50px; width: 90%; left:50%; transform:translateX(-50%);">
                            <a href="https://wa.me/9911105456" class="v-btn" style="background:#25D366; color:#fff; border-radius:50px; text-align:center;">CONFIRMAR ASISTENCIA</a>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <div id="bottom-editor">
        <div id="editor-ui"></div>
        <button class="btn-action" onclick="closeEditor()">GUARDAR CAMBIOS</button>
    </div>

    <script>
        let activeId = null;
        let activeEl = null;

        // INICIALIZAR MOVIMIENTO
        function initDrag() {
            const editables = document.querySelectorAll('.editable');
            editables.forEach(el => {
                el.onmousedown = el.ontouchstart = function(e) {
                    activeEl = el;
                    let startX = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
                    let startY = (e.type === 'touchstart') ? e.touches[0].clientY : e.clientY;
                    let initialLeft = el.offsetLeft;
                    let initialTop = el.offsetTop;

                    document.onmousemove = document.ontouchmove = function(ev) {
                        let moveX = (ev.type === 'touchmove' ? ev.touches[0].clientX : ev.clientX) - startX;
                        let moveY = (ev.type === 'touchmove' ? ev.touches[0].clientY : ev.clientY) - startY;
                        el.style.left = (initialLeft + moveX) + 'px';
                        el.style.top = (initialTop + moveY) + 'px';
                        el.style.transform = 'none';
                    };

                    document.onmouseup = document.ontouchend = function() {
                        document.onmousemove = document.ontouchmove = null;
                    };
                };

                el.onclick = function(e) {
                    e.stopPropagation();
                    openEditor(el.id);
                };
            });
        }

        // EDITOR
        function openEditor(id) {
            activeId = id;
            const el = document.getElementById(id);
            const ui = document.getElementById('editor-ui');
            ui.innerHTML = `
                <div class="input-row">
                    <label>Contenido de Texto</label>
                    <textarea id="edit-text" rows="4">${el.innerHTML.replace(/<br>/g, '\n')}</textarea>
                </div>
                <div class="input-row">
                    <label>Tamaño de Letra (px)</label>
                    <input type="number" id="edit-size" value="${parseInt(window.getComputedStyle(el).fontSize)}">
                </div>
            `;
            document.getElementById('bottom-editor').classList.add('open');
        }

        function closeEditor() {
            const el = document.getElementById(activeId);
            el.innerHTML = document.getElementById('edit-text').value.replace(/\n/g, '<br>');
            el.style.fontSize = document.getElementById('edit-size').value + 'px';
            document.getElementById('bottom-editor').classList.remove('open');
        }

        // CONTADOR (CORREGIDO)
        setInterval(() => {
            const target = new Date(document.getElementById('target-date').value).getTime();
            const now = new Date().getTime();
            const diff = target - now;

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('timer-display').innerText = `${d}d ${h}h ${m}m ${s}s`;
            } else {
                document.getElementById('timer-display').innerText = "¡LLEGÓ EL DÍA!";
            }
        }, 1000);

        function processExport() {
            const content = document.documentElement.outerHTML;
            const blob = new Blob([content], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'mi-invitacion.html';
            a.click();
        }

        window.onload = initDrag;
    </script>
</body>
</html>
